name: Validate & Release

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to create releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # в”Ђв”Ђ 1. Checkout with full history (needed for git diff) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # в”Ђв”Ђ 2. Setup Node.js в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # в”Ђв”Ђ 3. Validate .flashcards format в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Validate flashcard format
        run: node scripts/validate.mjs

      # в”Ђв”Ђ 4. Determine version bump в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get latest release tag (empty string if none exists)
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          echo "Previous tag: '${PREV_TAG}'"

          if [ -z "$PREV_TAG" ]; then
            # в”Ђв”Ђ First release в”Ђв”Ђ
            echo "new_tag=V1.0"         >> $GITHUB_OUTPUT
            echo "bump_type=initial"    >> $GITHUB_OUTPUT
            echo "release_notes=рџЋ‰ Initial release of Zapwise flashcards" >> $GITHUB_OUTPUT
          else
            # в”Ђв”Ђ Compare with previous release using git diff в”Ђв”Ђ
            git fetch --tags --quiet

            # Count removed cards (lines with separator that start with -)
            REMOVED=$(git diff "${PREV_TAG}" HEAD -- '*.flashcards' \
              | grep '^-[^-]' \
              | grep -cE ' (<>|=>|<=) ' \
              || echo "0")

            # Count added cards
            ADDED=$(git diff "${PREV_TAG}" HEAD -- '*.flashcards' \
              | grep '^+[^+]' \
              | grep -cE ' (<>|=>|<=) ' \
              || echo "0")

            echo "Removed cards: $REMOVED"
            echo "Added cards:   $ADDED"

            # Parse major/minor from previous tag (e.g. V2.3 в†’ 2, 3)
            MAJOR=$(echo "$PREV_TAG" | grep -oP '(?<=V)\d+(?=\.)')
            MINOR=$(echo "$PREV_TAG" | grep -oP '(?<=\.)\d+$')

            if [ "${REMOVED:-0}" -gt "0" ]; then
              # в”Ђв”Ђ Breaking change: cards were deleted в”Ђв”Ђ
              NEW_MAJOR=$((MAJOR + 1))
              NEW_TAG="V${NEW_MAJOR}.0"
              BUMP="major"
              NOTES="рџ’Ґ Breaking change: ${REMOVED} card(s) removed"
              [ "${ADDED:-0}" -gt "0" ] && NOTES="${NOTES}, ${ADDED} card(s) added"
            else
              # в”Ђв”Ђ Minor: only additions / edits в”Ђв”Ђ
              NEW_MINOR=$((MINOR + 1))
              NEW_TAG="V${MAJOR}.${NEW_MINOR}"
              BUMP="minor"
              if [ "${ADDED:-0}" -gt "0" ]; then
                NOTES="вњЁ ${ADDED} card(s) added/updated"
              else
                NOTES="рџ”§ Configuration or metadata updated"
              fi
            fi

            echo "Bump type: $BUMP  в†’  $PREV_TAG в†’ $NEW_TAG"
            echo "new_tag=$NEW_TAG"     >> $GITHUB_OUTPUT
            echo "bump_type=$BUMP"      >> $GITHUB_OUTPUT
            echo "release_notes=$NOTES" >> $GITHUB_OUTPUT
          fi

      # в”Ђв”Ђ 5. Create GitHub Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            --title "Zapwise Cards ${{ steps.version.outputs.new_tag }}" \
            --notes "${{ steps.version.outputs.release_notes }}" \
            --latest

          echo ""
          echo "вњ… Release created: ${{ steps.version.outputs.new_tag }}"
          echo "   Bump type: ${{ steps.version.outputs.bump_type }}"
